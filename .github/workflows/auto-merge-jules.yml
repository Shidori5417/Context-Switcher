name: Auto-Merge Google Jules PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: write

jobs:
  approve-and-merge:
    runs-on: ubuntu-latest
    # Sadece google-jules kullanıcısından gelen PR'ları işle
    if: github.event.pull_request.user.login == 'google-jules'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Approve and Merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          echo "Approving PR: $PR_URL"
          gh pr review "$PR_URL" --approve
          
          echo "Merging PR and deleting branch..."
          gh pr merge "$PR_URL" --merge --delete-branch --admin
